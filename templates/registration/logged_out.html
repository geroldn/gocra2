{% extends "wgocra/base.html" %}
{% load bootstrap4 %}

{% block title %}Uitgelogd{% endblock %}

{% block head-extra %}
  <style>
    .logout-wrapper {
      min-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .logout-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 0.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .logout-card h2 {
      font-weight: 600;
      margin-bottom: 1rem;
    }
  </style>
{% endblock %}

{% block content %}
  <div class="logout-wrapper">
    <div class="logout-card">
      <h2>Uitgelogd</h2>
      <p class="mb-4">Je bent succesvol uitgelogd.</p>
      <a href="{% url 'login' %}" class="btn btn-primary btn-block">Opnieuw inloggen</a>
    </div>
  </div>
{% endblock %}
