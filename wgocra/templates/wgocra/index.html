{% extends "wgocra/base.html" %}
{% load static %}

{% block title %}GOCRA{% endblock %}

{% block head-extra %}
  <style>
    body {
      min-height: 100vh;
      background-image: url("{% static 'wgocra/gocra_bg.png' %}");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    .gocra-home-overlay {
      min-height: calc(100vh - 120px);
      padding: 2rem 1rem;
    }
    .gocra-home-card {
      max-width: 720px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 0.5rem;
      padding: 1.5rem;
    }
  </style>
{% endblock %}

{% block content %}
  <div class="gocra-home-overlay d-flex align-items-start align-items-md-center justify-content-center">
    <div class="gocra-home-card shadow">
      <h2 class="mb-3">GOCRA</h2>
      <p class="mb-4">
        Toernooibeheer en ratingverwerking voor Go.
      </p>

      <div class="d-flex flex-column flex-sm-row">
        <a class="btn btn-primary mr-sm-2 mb-2 mb-sm-0" href="{% url 'gocra-public-series-list' %}">Afgeronde Toernooien</a>
        <a class="btn btn-outline-secondary" href="{% url 'login' %}">Login</a>
      </div>
    </div>
  </div>
{% endblock %}
